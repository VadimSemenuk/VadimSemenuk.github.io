<head>

	<meta charset="utf-8">

	<title>Заголовок</title>
	<meta name="description" content="">

	<link rel="shortcut icon" href="img/favicon/favicon.ico" type="image/x-icon">
	<link rel="apple-touch-icon" href="img/favicon/apple-touch-icon.png">
	<link rel="apple-touch-icon" sizes="72x72" href="img/favicon/apple-touch-icon-72x72.png">
	<link rel="apple-touch-icon" sizes="114x114" href="img/favicon/apple-touch-icon-114x114.png">

	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	
	<link rel="stylesheet" href="libs/font-awesome-4.7.0/css/font-awesome.min.css">	

	<link rel="stylesheet" href="css/fonts.css">
	<link rel="stylesheet" href="css/main.css">
	<link rel="stylesheet" href="css/media.css">
</head>

<body>

	<div class="container">
		<aside>
			<div class="top">
				<div class="group-name-container">
					<div class="group-name">
						<h1>Ais</h1>
						<div class="arrow-bot-i icon">
							<i class="fa fa-chevron-down"></i>
						</div>
					</div>
					<div class="notifications-i icon">
						<i class="fa fa-bell-o"></i>							
					</div>
				</div>
				<div class="user-name">
					<div class="status"></div>
					<span>Ilya Mokin</span>
				</div>		
			</div>
		</aside>
		<section class="content">
			<div class="head">
				<div class="channel-info">
					<div class="channel-name"><strong>#study</strong></div>
					<div class="channel-info-items">						
						<div class="star channel-info-item btn">
							<span class="star-i icon">
								<i class="fa fa-star-o" aria-hidden="true"></i>
							</span>
						</div>
						<div class="members channel-info-item btn">
							<span class="members-i icon">
								<i class="fa fa-user-o" aria-hidden="true"></i>							
							</span>
							<span>14</span>
						</div>
						<div class="pins channel-info-item btn">
							<span class="pins-i icon">
								<i class="fa fa-pencil-square-o" aria-hidden="true"></i>
							</span>
							<span>20</span>
						</div>
						<div class="topic channel-info-item btn">
							<span class="add-topic">Add a topic</span>
							<span class="hovered"><a href="#">Edit</a></span>
						</div>
					</div>
				</div>
				<div class="channel-work">
					<div class="phone-i icon btn">
						<i class="fa fa-phone" aria-hidden="true"></i>
					</div>	
					<div class="details-i icon btn">
						<i class="fa fa-info-circle" aria-hidden="true"></i>
					</div>	
					<div class="settings-i icon btn">
						<i class="fa fa-cog" aria-hidden="true"></i>
					</div>
					<div class="search">
						<div class="search-i icon">									
							<i class="fa fa-search" aria-hidden="true"></i>
						</div>
						<input type="text" name="search" placeholder="Search">
						<div class="del-i icon">									
							<i class="fa fa-times-circle-o" aria-hidden="true"></i>
						</div>
					</div>
					<div class="at-i icon btn">
						<i class="fa fa-at" aria-hidden="true"></i>
					</div>	
					<div class="star-i icon btn">
						<i class="fa fa-star-o" aria-hidden="true"></i>
					</div>	
					<div class="ellipsis-i icon btn">
						<i class="fa fa-ellipsis-v" aria-hidden="true"></i>
					</div>		
				</div>
			</div>
			<div class="chat-container"></div>
			<div class="msg-input"></div>				
		</section>	
	</div>
